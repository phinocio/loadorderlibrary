---
# Local Development docker-compose File.
services:
    db:
        image: mariadb:10.9
        container_name: lol-dev-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            SERVICE_NAME: mariadb
        volumes:
            - lol-testing-db:/var/lib/mysql
        networks:
            - lol
    app:
        build:
            context: .
            args:
                uid: 1000
            dockerfile: docker/dev/app/Dockerfile
            target: app-dev
        image: loadorderlibrary:dev
        container_name: lol-dev-app
        restart: unless-stopped
        entrypoint: sh -c "php artisan config:cache && php artisan route:cache && php artisan migrate:fresh --seed && exec php-fpm"
        volumes:
            - ./:/var/www
        networks:
            - lol
        depends_on: [db]
    nginx:
        build:
            context: .
            dockerfile: docker/dev/nginx/Dockerfile
            target: nginx-dev
        image: loadorderlibrary-nginx:dev
        container_name: lol-dev-nginx
        restart: unless-stopped
        ports:
            - '8001:80'
        volumes:
            - /var/log/nginx/:/var/log/nginx
        networks:
            - lol
        depends_on: [app]

networks:
    lol:
        driver: bridge

volumes:
    lol-testing-db:
