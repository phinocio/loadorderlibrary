# Generated by nginxconfig.io
# See nginxconfig.txt for the configuration share link

user                 nginx;
pid                  /var/run/nginx.pid;
worker_processes     auto;
worker_rlimit_nofile 65535;

# Load modules
include              /etc/nginx/modules-enabled/*.conf;

events {
    multi_accept       on;
    worker_connections 65535;
}

http {
    charset                utf-8;
    sendfile               on;
    tcp_nopush             on;
    tcp_nodelay            on;
    server_tokens          off;
    log_not_found          off;
    types_hash_max_size    2048;
    types_hash_bucket_size 64;
    client_max_body_size   16M;

    # MIME
    include                mime.types;
    default_type           application/octet-stream;

    # Logging
    access_log             off;
    error_log              /var/log/nginx/error.log warn;

    # Define a map to set the appropriate CSP header based on the request URI
    map $request_uri $csp_policy {
        # Otherwise, set the default CSP header (you can customize this as needed)
        default "default-src 'self' 'unsafe-inline'; frame-ancestors 'none'; frame-src 'none'";
        # If the URI matches /lists/*/embed/ route, set the appropriate CSP header
        "~^/lists/.*/embed/.+\.(txt|ini)$" "default-src 'self' https: frame-ancestors *; frame-src *";
        "~^/admin/logs$" "default-src 'self' data: blob: 'unsafe-inline' 'unsafe-eval';  frame-ancestors 'none'; frame-src 'none'";
    }

    # Load configs
    include                /etc/nginx/conf.d/*.conf;
}
