---
# Docker compose file for testing environment

services:
    db:
        image: mariadb:10.9
        container_name: lol-testing-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            SERVICE_NAME: mariadb
        profiles: ['testing', 'local']
        volumes:
            - lol-testing-db:/var/lib/mysql
        networks:
            - lol-db
    app:
        image: ghcr.io/phinocio/loadorderlibrary:testing
        container_name: lol-testing-app
        restart: unless-stopped
        entrypoint: sh -c "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate:fresh --seed && exec php-fpm"
        env_file: .env
        user: '2100:2100'
        profiles: ['testing', 'local']
        volumes:
            - ./storage/:/var/www/storage
        networks:
            - lol
            - lol-db
        depends_on: [db]
    nginx:
        image: ghcr.io/phinocio/loadorderlibrary-nginx:testing
        container_name: lol-testing-nginx
        restart: unless-stopped
        profiles: ['testing', 'local']
        networks:
            - lol
        depends_on: [app]

networks:
    lol:
        external: true
    lol-db:
        driver: bridge

volumes:
    lol-testing-db:
